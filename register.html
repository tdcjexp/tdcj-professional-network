<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
</head>

<body>

<h1>TDCJ Professional Network</h1>
<h2>Create Account</h2>

<form>

<label>Full Name</label><br>
<input type="text" placeholder="John Doe"><br><br>

<label>Email</label><br>
<input type="email" placeholder="name@email.com"><br><br>

<label>Password</label><br>
<input type="password" placeholder="Create password"><br><br>

<label>Years of Experience</label><br>
<input type="number"><br><br>

<label>Subject Matter Expertise (SME)</label><br>
<input type="text" placeholder="Use of Force, Transportation, Intake, Classification"><br><br>

<button type="submit">Create Account</button>

</form>

</body>
</html>
